# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: CD
run-name: Running continuous deployment on ${{ github.actor }}'s commits

permissions:
  contents: read

on:
  push:
    tags:
      - "*"

jobs:
  promoteImage:
    name: Promote Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # so we can reach latest commit before tag
          fetch-depth: 2

      - name: Setup Pipeline
        uses: ./.github/composite/setup
        with:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Get Parent SHA
        id: prev
        run: echo "sha=$(git rev-parse --short=7 ${{ github.sha }}^1)" >> $GITHUB_OUTPUT

      - name: Promote image
        uses: ./.github/composite/promote-image
        with:
          ORIGINAL_TAG: ${{ steps.prev.outputs.sha }}
          NEW_GITHUB_TAG: ${{ github.ref_name }}

  deployToProduction:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [promoteImage]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pipeline
        uses: ./.github/composite/setup
        with:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Deploy Service
        uses: ./.github/composite/deploy
        with:
          VERSION: ${{ github.ref_name }}
