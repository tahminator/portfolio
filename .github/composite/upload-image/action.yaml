name: Upload Docker image
description: Builds image and uploads to Docker

inputs:
  TAG_PREFIX:
    description: Docker tag prefix (e.g., staging-, empty for prod)
    required: false
    default: ""
  DOCKER_UPLOAD:
    description: Should upload to Docker Hub
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Build and push image
      shell: bash
      run: bun run .github/scripts/src/build-image \
        --tagPrefix="${{ inputs.TAG_PREFIX }}" \
        --dockerUpload="${{ inputs.DOCKER_UPLOAD }}"
